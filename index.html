<!DOCTYPE html>
<html>

<head>
<title>Ayushi's Job Tracker</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:#EDFFEC;
margin:0;
padding:40px;
color:#9D8189;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
font-size:36px;
font-weight:600;
margin-bottom:20px;
color:#9D8189;
}

.inputBox{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input{
padding:12px;
border-radius:12px;
border:none;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

button{
padding:12px 18px;
border:none;
background:#F4ACB7;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#FFCAD4;
}

.searchBox{
margin-bottom:25px;
}

.jobs{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
border-top:6px solid #FFCAD4;
}

.card h3{
margin:0 0 5px 0;
}

.card p{
margin:5px 0;
}

select{
margin-top:10px;
padding:6px;
border-radius:8px;
border:1px solid #D8E2DC;
}

a{
text-decoration:none;
color:#9D8189;
font-weight:500;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
🌸 Ayushi's Job Tracker
</div>

<div class="inputBox">

<input id="jobLink" placeholder="Job link">

<input id="title" placeholder="Job title">

<input id="company" placeholder="Company">

<input id="location" placeholder="Location">

<button onclick="addJob()">Add Job</button>

</div>

<div class="searchBox">
<input id="search" placeholder="Search jobs..." onkeyup="renderJobs()">
</div>

<div class="jobs" id="jobs"></div>

</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs")) || []

function saveJobs(){
localStorage.setItem("jobs",JSON.stringify(jobs))
}

function renderJobs(){

const search=document.getElementById("search").value.toLowerCase()

const container=document.getElementById("jobs")

container.innerHTML=""

jobs
.filter(job =>
job.title.toLowerCase().includes(search) ||
job.company.toLowerCase().includes(search) ||
job.location.toLowerCase().includes(search)
)
.forEach((job,index)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${job.title}</h3>

<p>🏢 ${job.company}</p>

<p>📍 ${job.location}</p>

<p><a href="${job.url}" target="_blank">View Job</a></p>

<select onchange="updateStatus(${index},this.value)">

<option ${job.status=="Applied"?"selected":""}>Applied</option>

<option ${job.status=="Interview"?"selected":""}>Interview</option>

<option ${job.status=="Offer"?"selected":""}>Offer</option>

<option ${job.status=="Rejected"?"selected":""}>Rejected</option>

</select>

`

container.appendChild(card)

})

}

function addJob(){

const link=document.getElementById("jobLink").value
const title=document.getElementById("title").value
const company=document.getElementById("company").value
const location=document.getElementById("location").value

if(!title)return

jobs.push({

title,
company,
location,
status:"Applied",
url:link

})

saveJobs()

renderJobs()

document.getElementById("jobLink").value=""
document.getElementById("title").value=""
document.getElementById("company").value=""
document.getElementById("location").value=""

}

function updateStatus(index,status){

jobs[index].status=status

saveJobs()

}

renderJobs()

</script>

</body>

</html>
