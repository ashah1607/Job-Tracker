<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>The Delusion Dashboard</title>

  <style>
    :root{
      --bg:#F4ACB7;
      --text:#9D8189;
      --card:#D8E2DC;
      --input:#FFE5D9;
      --btn:#F4ACB7;

      /* pie colors (use all + any from your palette family) */
      --p1:#D8E2DC;
      --p2:#FFE5D9;
      --p3:#FFCAD4;
      --p4:#F4ACB7;
      --p5:#9D8189;
    }

    *{ box-sizing:border-box; }

    /* One font everywhere */
    body, input, button, select, textarea{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body{
      margin:0;
      padding:28px 18px 60px;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
    }

    /* Header pill */
    .titlePill{
      background: rgba(255,255,255,.35);
      border: 2px solid rgba(157,129,137,.35);
      color: var(--text);
      border-radius: 28px;
      padding: 20px 18px 14px;
      text-align:center;
      box-shadow: 0 10px 24px rgba(157,129,137,.18);
      backdrop-filter: blur(6px);
    }
    .titlePill h1{
      margin:0;
      font-size: 34px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 800;
    }
    .titlePill p{
      margin: 6px 0 0;
      font-size: 14px;
      letter-spacing: .9px;
      text-transform: uppercase;
      font-weight: 700;
      opacity: .95;
    }

    /* Control rows */
    .controls{
      margin-top: 16px;
      display:grid;
      gap: 14px;
    }

    .controlRow{
      display:grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
      align-items: stretch;
    }

    .pillInput{
      background: var(--input);
      border-radius: 22px;
      padding: 14px 16px;
      display:flex;
      align-items:center;
      gap: 12px;
      border: 2px solid rgba(157,129,137,.35);
      box-shadow: 0 10px 18px rgba(157,129,137,.12);
    }

    .pillInput label{
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-size: 13px;
      white-space:nowrap;
      font-weight: 800;
    }

    .pillInput input{
      width:100%;
      border: none;
      outline:none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }
    .pillInput input::placeholder{
      color: rgba(157,129,137,.65);
      font-weight: 700;
    }

    .pillBtn{
      border: 2px solid rgba(157,129,137,.55);
      cursor:pointer;
      border-radius: 22px;
      padding: 14px 18px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      background: var(--btn);
      color: var(--text);
      box-shadow: 0 10px 18px rgba(157,129,137,.14);
      transition: transform .05s ease, filter .2s ease;
    }
    .pillBtn:hover{ filter: brightness(1.03); }
    .pillBtn:active{ transform: translateY(1px); }

    /* Main layout */
    .main{
      margin-top: 16px;
      display:grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items:start;
    }

    /* Stats column */
    .statCard{
      background: rgba(255,255,255,.35);
      border: 2px solid rgba(157,129,137,.35);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 18px rgba(157,129,137,.12);
      backdrop-filter: blur(6px);
    }

    .statTitle{
      text-transform: uppercase;
      letter-spacing: .9px;
      font-weight: 900;
      font-size: 13px;
      margin: 0 0 8px;
      color: var(--text);
    }

    .statBig{
      font-size: 46px;
      font-weight: 900;
      line-height: 1;
      margin: 0;
      color: var(--text);
    }

    .chartBox{
      margin-top: 14px;
      background: rgba(255,255,255,.25);
      border: 2px solid rgba(157,129,137,.22);
      border-radius: 18px;
      padding: 12px;
    }

    .legend{
      margin-top: 10px;
      display:grid;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      font-weight: 800;
    }
    .legendItem{
      display:flex;
      justify-content: space-between;
      gap:10px;
      align-items:center;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius: 999px;
      display:inline-block;
      margin-right:8px;
      flex: 0 0 auto;
      border:1px solid rgba(157,129,137,.35);
    }
    .legendLeft{
      display:flex;
      align-items:center;
      min-width: 0;
    }
    .legendName{
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    /* Jobs grid */
    .jobsGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .jobCard{
      background: var(--card);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 10px 18px rgba(157,129,137,.12);
      border: 2px solid rgba(157,129,137,.35);
      position: relative;
      color: var(--text);
    }

    .jobTop{
      display:flex;
      justify-content: space-between;
      align-items:flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .tag{
      border: 2px solid rgba(157,129,137,.35);
      background: rgba(255,255,255,.25);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .6px;
      text-transform: uppercase;
      white-space:nowrap;
    }

    .jobText{
      display:grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .jobText b{
      font-weight: 900;
    }

    .jobLinkRow{
      margin-top: 12px;
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 10px;
    }

    .linkBtn{
      display:inline-block;
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.35);
      border: 2px solid rgba(157,129,137,.35);
      color: var(--text);
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .7px;
      font-size: 12px;
      white-space:nowrap;
    }

    select{
      border-radius: 14px;
      border: 2px solid rgba(157,129,137,.35);
      padding: 8px 10px;
      background: var(--input);
      color: var(--text);
      font-weight: 900;
      cursor:pointer;
    }

    .row2{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-bottom:14px;
    }

    .miniInput{
      width:100%;
      padding: 11px 12px;
      border-radius: 16px;
      border: 2px solid rgba(157,129,137,.30);
      background: var(--input);
      color: var(--text);
      outline:none;
      font-weight: 800;
    }

    .miniInput::placeholder{
      color: rgba(157,129,137,.65);
      font-weight: 800;
    }

    .actionsRow{
      margin-top: 10px;
      display:flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .smallBtn{
      padding: 10px 12px;
      border-radius: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .7px;
      border: 2px solid rgba(157,129,137,.55);
      background: rgba(255,255,255,.30);
      color: var(--text);
      cursor:pointer;
    }

    .smallBtn.primary{
      background: var(--btn);
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      font-weight: 800;
      opacity: .9;
    }

    @media (max-width: 1050px){
      .jobsGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controlRow{ grid-template-columns: 1fr; }
    }
    @media (max-width: 760px){
      .main{ grid-template-columns: 1fr; }
      .jobsGrid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="titlePill">
      <h1>THE DELUSION DASHBOARD</h1>
      <p>MANIFESTING EMPLOYMENT</p>
    </div>

    <div class="controls">
      <div class="controlRow">
        <div class="pillInput">
          <label>Job Link</label>
          <input id="jobLink" placeholder="paste link here..." />
        </div>
        <button class="pillBtn" onclick="addJob()">ADD JOB</button>
      </div>

      <div class="controlRow">
        <div class="pillInput">
          <label>Search Word</label>
          <input id="search" placeholder="company, position, location..." />
        </div>
        <button class="pillBtn" onclick="renderJobs()">SEARCH JOB</button>
      </div>
    </div>

    <div class="main">
      <!-- Left: stats -->
      <div>
        <div class="statCard">
          <div class="statTitle">Total Applications</div>
          <p class="statBig" id="totalApps">0</p>

          <div class="chartBox">
            <canvas id="pie" width="260" height="260" aria-label="status pie chart"></canvas>
            <div class="legend" id="legend"></div>
          </div>

          <div class="hint">
            Change a card’s status → pie chart updates instantly.
          </div>
        </div>
      </div>

      <!-- Right: add fields + cards -->
      <div>
        <div class="row2">
          <input class="miniInput" id="company" placeholder="Company" />
          <input class="miniInput" id="position" placeholder="Position / Title" />
          <input class="miniInput" id="workStyle" placeholder="Work style (Remote/Hybrid/On-site)" />
          <input class="miniInput" id="location" placeholder="Location" />
          <input class="miniInput" id="salary" placeholder="Salary (e.g., $60k–$75k)" />
          <select id="statusDefault" title="default status">
            <option>Applied</option>
            <option>Awaiting Response</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>
          </select>
        </div>

        <div class="jobsGrid" id="jobsGrid"></div>
      </div>
    </div>

  </div>

  <script>
    let jobs = JSON.parse(localStorage.getItem("jobs_delusion_dashboard")) || [];

    const STATUS_ORDER = ["Applied","Awaiting Response","Interview","Offer","Rejected"];

    // Pie chart uses all the allowed colors
    const PIE_COLORS = {
      "Applied": getCss("--p3"),
      "Awaiting Response": getCss("--p1"),
      "Interview": getCss("--p4"),
      "Offer": getCss("--p2"),
      "Rejected": getCss("--p5")
    };

    function getCss(varName){
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function saveJobs(){
      localStorage.setItem("jobs_delusion_dashboard", JSON.stringify(jobs));
    }

    function addJob(){
      const url = document.getElementById("jobLink").value.trim();
      if(!url) return;

      const company = document.getElementById("company").value.trim() || "Company";
      const position = document.getElementById("position").value.trim() || "Position";
      const workStyle = document.getElementById("workStyle").value.trim() || "Work style";
      const location = document.getElementById("location").value.trim() || "Location";
      const salary = document.getElementById("salary").value.trim() || "Salary";
      const status = document.getElementById("statusDefault").value;

      jobs.unshift({
        id: crypto.randomUUID(),
        company,
        position,
        workStyle,
        location,
        salary,
        url,
        status
      });

      saveJobs();
      clearAddFields();
      renderJobs();
    }

    function clearAddFields(){
      document.getElementById("jobLink").value = "";
      document.getElementById("company").value = "";
      document.getElementById("position").value = "";
      document.getElementById("workStyle").value = "";
      document.getElementById("location").value = "";
      document.getElementById("salary").value = "";
      document.getElementById("statusDefault").value = "Applied";
    }

    function updateStatus(id, newStatus){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j.status = newStatus;
      saveJobs();
      renderJobs();
    }

    function deleteJob(id){
      jobs = jobs.filter(x => x.id !== id);
      saveJobs();
      renderJobs();
    }

    // EDIT MODE
    function startEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j._editing = true;
      renderJobs();
    }

    function cancelEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j._editing = false;
      renderJobs();
    }

    function saveEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;

      const company = document.getElementById(`e_company_${id}`).value.trim() || "Company";
      const position = document.getElementById(`e_position_${id}`).value.trim() || "Position";
      const workStyle = document.getElementById(`e_workStyle_${id}`).value.trim() || "Work style";
      const location = document.getElementById(`e_location_${id}`).value.trim() || "Location";
      const salary = document.getElementById(`e_salary_${id}`).value.trim() || "Salary";
      const url = document.getElementById(`e_url_${id}`).value.trim() || j.url;

      j.company = company;
      j.position = position;
      j.workStyle = workStyle;
      j.location = location;
      j.salary = salary;
      j.url = url;

      j._editing = false;

      saveJobs();
      renderJobs();
    }

    function renderJobs(){
      const q = (document.getElementById("search").value || "").toLowerCase().trim();
      const grid = document.getElementById("jobsGrid");
      grid.innerHTML = "";

      const filtered = jobs.filter(j => {
        if(!q) return true;
        return (
          (j.company || "").toLowerCase().includes(q) ||
          (j.position || "").toLowerCase().includes(q) ||
          (j.location || "").toLowerCase().includes(q) ||
          (j.workStyle || "").toLowerCase().includes(q) ||
          (j.salary || "").toLowerCase().includes(q)
        );
      });

      document.getElementById("totalApps").textContent = String(jobs.length);

      filtered.forEach(job => {
        const card = document.createElement("div");
        card.className = "jobCard";

        if(job._editing){
          card.innerHTML = `
            <div class="jobTop">
              <span class="tag">EDITING</span>
              <select onchange="updateStatus('${job.id}', this.value)">
                ${STATUS_ORDER.map(s => `<option ${s===job.status ? "selected":""}>${s}</option>`).join("")}
              </select>
            </div>

            <div class="jobText">
              <div><b>Company</b> <input class="miniInput" id="e_company_${job.id}" value="${escapeAttr(job.company)}"></div>
              <div><b>Position</b> <input class="miniInput" id="e_position_${job.id}" value="${escapeAttr(job.position)}"></div>
              <div><b>Work style</b> <input class="miniInput" id="e_workStyle_${job.id}" value="${escapeAttr(job.workStyle)}"></div>
              <div><b>Location</b> <input class="miniInput" id="e_location_${job.id}" value="${escapeAttr(job.location)}"></div>
              <div><b>Salary</b> <input class="miniInput" id="e_salary_${job.id}" value="${escapeAttr(job.salary)}"></div>
              <div><b>Link</b> <input class="miniInput" id="e_url_${job.id}" value="${escapeAttr(job.url)}"></div>
            </div>

            <div class="actionsRow">
              <button class="smallBtn" onclick="cancelEdit('${job.id}')">Cancel</button>
              <button class="smallBtn primary" onclick="saveEdit('${job.id}')">Save</button>
              <button class="smallBtn" onclick="deleteJob('${job.id}')">Delete</button>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="jobTop">
              <div class="tag">${escapeHtml(job.status)}</div>
              <select onchange="updateStatus('${job.id}', this.value)">
                ${STATUS_ORDER.map(s => `<option ${s===job.status ? "selected":""}>${s}</option>`).join("")}
              </select>
            </div>

            <div class="jobText">
              <div><b>Company:</b> ${escapeHtml(job.company)}</div>
              <div><b>Position:</b> ${escapeHtml(job.position)}</div>
              <div><b>Work style:</b> ${escapeHtml(job.workStyle)}</div>
              <div><b>Location:</b> ${escapeHtml(job.location)}</div>
              <div><b>Salary:</b> ${escapeHtml(job.salary)}</div>
            </div>

            <div class="jobLinkRow">
              <a class="linkBtn" href="${escapeAttr(job.url)}" target="_blank" rel="noreferrer">Link</a>
              <button class="smallBtn" onclick="startEdit('${job.id}')">Edit</button>
            </div>

            <div class="actionsRow">
              <button class="smallBtn" onclick="deleteJob('${job.id}')">Delete</button>
            </div>
          `;
        }

        grid.appendChild(card);
      });

      drawPie();
      drawLegend();
    }

    function getStatusCounts(){
      const counts = {};
      STATUS_ORDER.forEach(s => counts[s] = 0);
      jobs.forEach(j => {
        const s = STATUS_ORDER.includes(j.status) ? j.status : "Applied";
        counts[s] = (counts[s] || 0) + 1;
      });
      return counts;
    }

    function drawPie(){
      const canvas = document.getElementById("pie");
      const ctx = canvas.getContext("2d");
      const counts = getStatusCounts();
      const total = Object.values(counts).reduce((a,b)=>a+b,0);

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const cx = canvas.width/2;
      const cy = canvas.height/2;
      const r = Math.min(cx,cy) - 8;

      if(total === 0){
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,229,217,.55)";
        ctx.fill();

        ctx.fillStyle = getCss("--text");
        ctx.font = "900 14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.textAlign = "center";
        ctx.fillText("No jobs yet", cx, cy);
        return;
      }

      let start = -Math.PI/2;

      STATUS_ORDER.forEach(status => {
        const val = counts[status] || 0;
        if(val <= 0) return;
        const slice = (val/total) * Math.PI*2;

        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx, cy, r, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = PIE_COLORS[status];
        ctx.fill();

        start += slice;
      });

      // donut hole
      ctx.beginPath();
      ctx.arc(cx, cy, r*0.58, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,229,217,.65)";
      ctx.fill();

      ctx.fillStyle = getCss("--text");
      ctx.font = "900 18px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.textAlign = "center";
      ctx.fillText(`${total}`, cx, cy-2);

      ctx.font = "900 11px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillStyle = getCss("--text");
      ctx.fillText("total", cx, cy+14);
    }

    function drawLegend(){
      const el = document.getElementById("legend");
      const counts = getStatusCounts();
      const total = Object.values(counts).reduce((a,b)=>a+b,0) || 1;

      el.innerHTML = STATUS_ORDER.map(status => {
        const val = counts[status] || 0;
        const pct = Math.round((val/total)*100);
        return `
          <div class="legendItem">
            <div class="legendLeft">
              <span class="dot" style="background:${PIE_COLORS[status]}"></span>
              <span class="legendName">${status}</span>
            </div>
            <div>${val} • ${pct}%</div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }
    function escapeAttr(str){
      return escapeHtml(str).replaceAll("`","&#96;");
    }

    renderJobs();
  </script>
</body>
</html>
