<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>The Delusion Dashboard</title>

  <style>
    :root{
      /* Aesthetic girly palette (softer + cleaner contrast) */
      --bg:#FFF1F5;        /* blush background */
      --panel:#FFFFFFCC;   /* frosted panels */
      --text:#6F5B63;      /* soft mauve text */
      --muted:#8E7B83;

      --card:#E8F0EE;      /* soft sage cards */
      --input:#FFF7F0;     /* warm cream inputs */
      --border:#E6CAD3;    /* blush border */
      --shadow: rgba(111,91,99,.16);

      --btn:#F6B4C4;       /* rosy button */
      --btnHover:#F39FB4;

      /* Pie colors (cute + cohesive) */
      --p1:#F6B4C4; /* rosy */
      --p2:#FFD6E2; /* light pink */
      --p3:#E8F0EE; /* sage */
      --p4:#FFF7F0; /* cream */
      --p5:#6F5B63; /* mauve */
    }

    *{ box-sizing:border-box; }

    /* One font everywhere */
    body, input, button, select, textarea{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body{
      margin:0;
      padding:26px 16px 60px;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
    }

    /* Header pill */
    .titlePill{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 18px 16px 14px;
      text-align:center;
      box-shadow: 0 14px 30px var(--shadow);
      backdrop-filter: blur(10px);
    }
    .titlePill h1{
      margin:0;
      font-size: 30px;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-weight: 900;
    }
    .titlePill p{
      margin: 6px 0 0;
      font-size: 13px;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    /* Control rows */
    .controls{
      margin-top: 14px;
      display:grid;
      gap: 12px;
    }

    .controlRow{
      display:grid;
      grid-template-columns: 1fr 240px;
      gap: 12px;
      align-items: stretch;
    }

    .pillInput{
      background: var(--input);
      border-radius: 18px;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      gap: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 18px rgba(111,91,99,.10);
      min-width: 0;
    }

    .pillInput label{
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      font-size: 12px;
      white-space:nowrap;
      font-weight: 900;
    }

    .pillInput input{
      width:100%;
      border: none;
      outline:none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      min-width: 0;
    }
    .pillInput input::placeholder{
      color: rgba(111,91,99,.55);
      font-weight: 700;
    }

    .pillBtn{
      border: 1px solid rgba(111,91,99,.18);
      cursor:pointer;
      border-radius: 18px;
      padding: 12px 16px;
      font-weight: 900;
      letter-spacing: .6px;
      text-transform: uppercase;
      background: var(--btn);
      color: #fff;
      box-shadow: 0 12px 20px rgba(246,180,196,.35);
      transition: transform .05s ease, filter .2s ease;
    }
    .pillBtn:hover{ background: var(--btnHover); }
    .pillBtn:active{ transform: translateY(1px); }

    /* Main layout */
    .main{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items:start;
    }

    /* Stats column */
    .statCard{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 14px 26px rgba(111,91,99,.12);
      backdrop-filter: blur(10px);
    }

    .statTitle{
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 900;
      font-size: 12px;
      margin: 0 0 6px;
      color: var(--muted);
    }

    .statBig{
      font-size: 44px;
      font-weight: 950;
      line-height: 1;
      margin: 0;
      color: var(--text);
    }

    .chartBox{
      margin-top: 12px;
      background: rgba(255,255,255,.55);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
    }

    .legend{
      margin-top: 10px;
      display:grid;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text);
      font-weight: 800;
    }

    .legendItem{
      display:flex;
      justify-content: space-between;
      gap:10px;
      align-items:center;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius: 999px;
      display:inline-block;
      margin-right:8px;
      border:1px solid rgba(111,91,99,.25);
      flex:0 0 auto;
    }
    .legendLeft{
      display:flex;
      align-items:center;
      min-width:0;
    }
    .legendName{
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(111,91,99,.75);
      font-weight: 700;
    }

    /* Add fields row */
    .row2{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .miniInput{
      width:100%;
      padding: 11px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      outline:none;
      font-weight: 700;
      box-shadow: 0 8px 14px rgba(111,91,99,.08);
      min-width: 0;
    }

    .row2 .pillBtn{
      width:100%;
      height:46px;
      border-radius:16px;
      padding:10px 12px;
    }

    .miniInput::placeholder{
      color: rgba(111,91,99,.55);
      font-weight: 700;
    }

    select{
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: var(--input);
      color: var(--text);
      font-weight: 800;
      cursor:pointer;
      min-width: 0;
    }

    /* Jobs grid */
    .jobsGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .jobCard{
      background: var(--card);
      border-radius: 20px;
      padding: 14px;
      border: 1px solid rgba(111,91,99,.18);
      box-shadow: 0 14px 20px rgba(111,91,99,.10);
      color: var(--text);

      /* THIS prevents “poking out” */
      overflow: hidden;
    }

    /* Make card header wrap nicely on small widths */
    .jobTop{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap; /* <— prevents overflow */
      margin-bottom: 10px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      border: 1px solid rgba(111,91,99,.18);
      background: rgba(255,255,255,.55);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .5px;
      text-transform: uppercase;
      max-width: 100%;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Card content */
    .jobText{
      display:grid;
      gap: 7px;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.25;
      word-break: break-word;
    }
    .jobText b{ font-weight: 900; color: rgba(111,91,99,.92); }

    /* Link + edit row */
    .jobLinkRow{
      margin-top: 12px;
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content: space-between;
      flex-wrap: wrap; /* <— prevents overflow */
    }

    .linkBtn{
      display:inline-block;
      padding: 9px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(111,91,99,.18);
      color: var(--text);
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-size: 12px;
      white-space: nowrap;
      max-width: 100%;
    }
    .linkBtn:hover{ filter: brightness(1.02); }

    .actionsRow{
      margin-top: 10px;
      display:flex;
      gap: 10px;
      justify-content:flex-end;
      flex-wrap: wrap; /* <— prevents overflow */
    }

    .smallBtn{
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .6px;
      border: 1px solid rgba(111,91,99,.18);
      background: rgba(255,255,255,.60);
      color: var(--text);
      cursor:pointer;
      white-space: nowrap;
      max-width: 100%;
    }

    .smallBtn.primary{
      background: var(--btn);
      color: #fff;
      border-color: rgba(255,255,255,.0);
    }
    .smallBtn.primary:hover{ background: var(--btnHover); }

    /* Responsive */
    @media (max-width: 1050px){
      .jobsGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controlRow{ grid-template-columns: 1fr; }
      .main{ grid-template-columns: 320px 1fr; }
    }
    @media (max-width: 780px){
      .main{ grid-template-columns: 1fr; }
      .jobsGrid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="titlePill">
      <h1>THE DELUSION DASHBOARD</h1>
      <p>MANIFESTING EMPLOYMENT</p>
    </div>

    <div class="controls">
      <div class="controlRow">
        <div class="pillInput">
          <label>Job Link</label>
          <input id="jobLink" placeholder="paste link here..." />
        </div>
        <button class="pillBtn" onclick="addJob()">ADD JOB</button>
      </div>

      <div class="controlRow">
        <div class="pillInput">
          <label>Search</label>
          <input id="search" placeholder="company, position, location..." />
        </div>
        <button class="pillBtn" onclick="renderJobs()">SEARCH JOB</button>
      </div>
    </div>

    <div class="main">
      <!-- Left: stats -->
      <div>
        <div class="statCard">
          <div class="statTitle">Total Applications</div>
          <p class="statBig" id="totalApps">0</p>

          <div class="chartBox">
            <canvas id="pie" width="260" height="260" aria-label="status pie chart"></canvas>
            <div class="legend" id="legend"></div>
          </div>

          <div class="hint">
            Change a card’s status → chart updates instantly.
          </div>
        </div>
      </div>

      <!-- Right: add fields + cards -->
      <div>
        <div class="row2">
  <input class="miniInput" id="company" placeholder="Company" />
  <input class="miniInput" id="position" placeholder="Position / Title" />

  <input class="miniInput" id="workStyle" placeholder="Work style (Remote/Hybrid/On-site)" />
  <select id="statusDefault" title="default status">
    <option>Applied</option>
    <option>Awaiting Response</option>
    <option>Interview</option>
    <option>Offer</option>
    <option>Rejected</option>
  </select>

  <input class="miniInput" id="salary" placeholder="Salary (e.g., $60k–$75k)" />
  <button class="pillBtn" onclick="addJobManual()">ADD JOB (MANUAL)</button>

  <input class="miniInput" id="location" placeholder="Location" />
</div>

        <div class="jobsGrid" id="jobsGrid"></div>
      </div>
    </div>

  </div>

  <script>
    let jobs = JSON.parse(localStorage.getItem("jobs_delusion_dashboard")) || [];

    const STATUS_ORDER = ["Applied","Awaiting Response","Interview","Offer","Rejected"];

    function cssVar(name){
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Pie chart colors (uses all the theme colors)
    const PIE_COLORS = {
      "Applied": cssVar("--p2"),
      "Awaiting Response": cssVar("--p3"),
      "Interview": cssVar("--p1"),
      "Offer": cssVar("--p4"),
      "Rejected": cssVar("--p5")
    };

    function saveJobs(){
      localStorage.setItem("jobs_delusion_dashboard", JSON.stringify(jobs));
    }

    function addJob(){
      const url = document.getElementById("jobLink").value.trim();
      if(!url) return;

      const company = document.getElementById("company").value.trim() || "Company";
      const position = document.getElementById("position").value.trim() || "Position";
      const workStyle = document.getElementById("workStyle").value.trim() || "Work style";
      const location = document.getElementById("location").value.trim() || "Location";
      const salary = document.getElementById("salary").value.trim() || "Salary";
      const status = document.getElementById("statusDefault").value;

      jobs.unshift({
        id: crypto.randomUUID(),
        company,
        position,
        workStyle,
        location,
        salary,
        url,
        status
      });

      saveJobs();
      clearAddFields();
      renderJobs();
    }

  function addJobManual(){

    const company = document.getElementById("company").value.trim();
    const position = document.getElementById("position").value.trim();
    const workStyle = document.getElementById("workStyle").value.trim();
    const location = document.getElementById("location").value.trim();
    const salary = document.getElementById("salary").value.trim();
    const status = document.getElementById("statusDefault").value;

  if(!company && !position) return;

  jobs.unshift({
    id: crypto.randomUUID(),
    company: company || "Company",
    position: position || "Position",
    workStyle: workStyle || "Work style",
    location: location || "Location",
    salary: salary || "Salary",
    url: "",
    status
  });

  saveJobs();
  clearAddFields();
  renderJobs();
 }

    function clearAddFields(){
      document.getElementById("jobLink").value = "";
      document.getElementById("company").value = "";
      document.getElementById("position").value = "";
      document.getElementById("workStyle").value = "";
      document.getElementById("location").value = "";
      document.getElementById("salary").value = "";
      document.getElementById("statusDefault").value = "Applied";
    }

    function updateStatus(id, newStatus){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j.status = newStatus;
      saveJobs();
      renderJobs();
    }

    function deleteJob(id){
      jobs = jobs.filter(x => x.id !== id);
      saveJobs();
      renderJobs();
    }

    // EDIT MODE
    function startEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j._editing = true;
      renderJobs();
    }

    function cancelEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;
      j._editing = false;
      renderJobs();
    }

    function saveEdit(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;

      const company = document.getElementById(`e_company_${id}`).value.trim() || "Company";
      const position = document.getElementById(`e_position_${id}`).value.trim() || "Position";
      const workStyle = document.getElementById(`e_workStyle_${id}`).value.trim() || "Work style";
      const location = document.getElementById(`e_location_${id}`).value.trim() || "Location";
      const salary = document.getElementById(`e_salary_${id}`).value.trim() || "Salary";
      const url = document.getElementById(`e_url_${id}`).value.trim() || j.url;

      j.company = company;
      j.position = position;
      j.workStyle = workStyle;
      j.location = location;
      j.salary = salary;
      j.url = url;

      j._editing = false;
      saveJobs();
      renderJobs();
    }

    function renderJobs(){
      const q = (document.getElementById("search").value || "").toLowerCase().trim();
      const grid = document.getElementById("jobsGrid");
      grid.innerHTML = "";

      const filtered = jobs.filter(j => {
        if(!q) return true;
        return (
          (j.company || "").toLowerCase().includes(q) ||
          (j.position || "").toLowerCase().includes(q) ||
          (j.location || "").toLowerCase().includes(q) ||
          (j.workStyle || "").toLowerCase().includes(q) ||
          (j.salary || "").toLowerCase().includes(q)
        );
      });

      document.getElementById("totalApps").textContent = String(jobs.length);

      filtered.forEach(job => {
        const card = document.createElement("div");
        card.className = "jobCard";

        if(job._editing){
          card.innerHTML = `
            <div class="jobTop">
              <span class="tag">Editing</span>
              <select onchange="updateStatus('${job.id}', this.value)">
                ${STATUS_ORDER.map(s => `<option ${s===job.status ? "selected":""}>${s}</option>`).join("")}
              </select>
            </div>

            <div class="jobText">
              <div><b>Company</b><br><input class="miniInput" id="e_company_${job.id}" value="${escapeAttr(job.company)}"></div>
              <div><b>Position</b><br><input class="miniInput" id="e_position_${job.id}" value="${escapeAttr(job.position)}"></div>
              <div><b>Work style</b><br><input class="miniInput" id="e_workStyle_${job.id}" value="${escapeAttr(job.workStyle)}"></div>
              <div><b>Location</b><br><input class="miniInput" id="e_location_${job.id}" value="${escapeAttr(job.location)}"></div>
              <div><b>Salary</b><br><input class="miniInput" id="e_salary_${job.id}" value="${escapeAttr(job.salary)}"></div>
              <div><b>Link</b><br><input class="miniInput" id="e_url_${job.id}" value="${escapeAttr(job.url)}"></div>
            </div>

            <div class="actionsRow">
              <button class="smallBtn" onclick="cancelEdit('${job.id}')">Cancel</button>
              <button class="smallBtn primary" onclick="saveEdit('${job.id}')">Save</button>
              <button class="smallBtn" onclick="deleteJob('${job.id}')">Delete</button>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="jobTop">
              <div class="tag">${escapeHtml(job.status)}</div>
              <select onchange="updateStatus('${job.id}', this.value)">
                ${STATUS_ORDER.map(s => `<option ${s===job.status ? "selected":""}>${s}</option>`).join("")}
              </select>
            </div>

            <div class="jobText">
              <div><b>Company:</b> ${escapeHtml(job.company)}</div>
              <div><b>Position:</b> ${escapeHtml(job.position)}</div>
              <div><b>Work style:</b> ${escapeHtml(job.workStyle)}</div>
              <div><b>Location:</b> ${escapeHtml(job.location)}</div>
              <div><b>Salary:</b> ${escapeHtml(job.salary)}</div>
            </div>

            <div class="jobLinkRow">
              <a class="linkBtn" href="${escapeAttr(job.url)}" target="_blank" rel="noreferrer">Link</a>
              <button class="smallBtn" onclick="startEdit('${job.id}')">Edit</button>
              <button class="smallBtn" onclick="deleteJob('${job.id}')">Delete</button>
            </div>
          `;
        }

        grid.appendChild(card);
      });

      drawPie();
      drawLegend();
    }

    function getStatusCounts(){
      const counts = {};
      STATUS_ORDER.forEach(s => counts[s] = 0);
      jobs.forEach(j => {
        const s = STATUS_ORDER.includes(j.status) ? j.status : "Applied";
        counts[s] = (counts[s] || 0) + 1;
      });
      return counts;
    }

    function drawPie(){
      const canvas = document.getElementById("pie");
      const ctx = canvas.getContext("2d");
      const counts = getStatusCounts();
      const total = Object.values(counts).reduce((a,b)=>a+b,0);

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const cx = canvas.width/2;
      const cy = canvas.height/2;
      const r = Math.min(cx,cy) - 8;

      if(total === 0){
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255, 247, 240, .9)";
        ctx.fill();

        ctx.fillStyle = cssVar("--text");
        ctx.font = "900 14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.textAlign = "center";
        ctx.fillText("No jobs yet", cx, cy);
        return;
      }

      let start = -Math.PI/2;
      STATUS_ORDER.forEach(status => {
        const val = counts[status] || 0;
        if(val <= 0) return;
        const slice = (val/total) * Math.PI*2;

        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx, cy, r, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = PIE_COLORS[status];
        ctx.fill();

        start += slice;
      });

      // donut hole
      ctx.beginPath();
      ctx.arc(cx, cy, r*0.58, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.fill();

      ctx.fillStyle = cssVar("--text");
      ctx.font = "950 18px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.textAlign = "center";
      ctx.fillText(`${total}`, cx, cy-2);

      ctx.font = "900 11px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillStyle = cssVar("--muted");
      ctx.fillText("total", cx, cy+14);
    }

    function drawLegend(){
      const el = document.getElementById("legend");
      const counts = getStatusCounts();
      const total = Object.values(counts).reduce((a,b)=>a+b,0) || 1;

      el.innerHTML = STATUS_ORDER.map(status => {
        const val = counts[status] || 0;
        const pct = Math.round((val/total)*100);
        return `
          <div class="legendItem">
            <div class="legendLeft">
              <span class="dot" style="background:${PIE_COLORS[status]}"></span>
              <span class="legendName">${status}</span>
            </div>
            <div>${val} • ${pct}%</div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }
    function escapeAttr(str){
      return escapeHtml(str).replaceAll("`","&#96;");
    }

    renderJobs();
  </script>
</body>
</html>
